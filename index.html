<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Docker & CI/CD</title>
    <style>
        :root {
            --primary-color: #2496ed; /* Azul Docker */
            --success-color: #00b4d8;
            --text-color: #2d3748;
            --bg-color: #f7fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 5px solid var(--primary-color);
        }

        .badge {
            background-color: #e1f5fe;
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #1a202c;
        }

        .student-name {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #edf2f7;
        }

        .status-box {
            background-color: #edf2f7;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 1.5rem;
        }

        .status-success {
            color: #2b6cb0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Pipeline Estado: Éxito</div>
        
        <h1>Evaluación Práctica</h1>
        <p>Docker & Integración Continua</p>
        
        <div class="student-name">
            Estudiante: [PABLO FERNÁNDEZ]
        </div>
        <div class="status-box">
            <p>🚀 El contenedor Docker se ha desplegado correctamente vía <strong>CI/CD</strong>.</p>
        </div>
    </div>

</body>
</html>
